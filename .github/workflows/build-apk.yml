name: Android CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Android CI
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate signing keystore
        working-directory: apps/android
        shell: pwsh
        run: |
          if (-not (Test-Path keystore.properties)) {
            Write-Host "keystore.properties not found, generating a CI signing key..."
            keytool -genkeypair -v `
              -keystore ci-release.keystore `
              -alias ci-release `
              -keyalg RSA -keysize 2048 -validity 10000 `
              -storepass android -keypass android `
              -dname "CN=CI, OU=CI, O=ShirohaQuiz, L=CI, S=CI, C=US"
            "storeFile=ci-release.keystore`nstorePassword=android`nkeyAlias=ci-release`nkeyPassword=android" | Out-File -FilePath keystore.properties -Encoding ascii
            Write-Host "CI signing key generated."
          } else {
            Write-Host "keystore.properties found, using existing config."
          }

      - name: Build web release APK
        working-directory: apps/android
        shell: pwsh
        run: .\gradlew.bat assembleWebRelease --no-daemon --stacktrace

      - name: Upload web APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-web-release
          path: |
            apps/android/app/build/outputs/apk/web/release/*.apk
            apps/android/app/build/outputs/shiroha-quiz/Shiroha-Quiz-*web*.apk
          if-no-files-found: error
