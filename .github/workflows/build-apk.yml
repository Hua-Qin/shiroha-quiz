name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate signing keystore
        working-directory: apps/android
        run: |
          if [ ! -f keystore.properties ]; then
            echo "keystore.properties not found, generating a CI signing key..."
            keytool -genkeypair -v \
              -keystore ci-release.keystore \
              -alias ci-release \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=CI, OU=CI, O=ShirohaQuiz, L=CI, S=CI, C=US"
            printf 'storeFile=ci-release.keystore\nstorePassword=android\nkeyAlias=ci-release\nkeyPassword=android\n' > keystore.properties
            echo "CI signing key generated."
          else
            echo "keystore.properties found, using existing config."
          fi

      - name: Grant execute permission for gradlew
        working-directory: apps/android
        run: chmod +x ./gradlew

      - name: Build web release APK
        working-directory: apps/android
        run: ./gradlew assembleWebRelease --no-daemon --stacktrace

      - name: Build native release APK
        working-directory: apps/android
        run: ./gradlew assembleNativeRelease --no-daemon --stacktrace

      - name: Upload web APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-web-release
          path: |
            apps/android/app/build/outputs/apk/web/release/*.apk
            apps/android/app/build/outputs/shiroha-quiz/Shiroha-Quiz-*web*.apk
          if-no-files-found: error

      - name: Upload native APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-native-release
          path: |
            apps/android/app/build/outputs/apk/native/release/*.apk
            apps/android/app/build/outputs/shiroha-quiz/Shiroha-Quiz-*native*.apk
          if-no-files-found: error
